<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    user-select: none;
  }
  h1 { font-size: 52px; letter-spacing: 12px; margin-bottom: 40px; }
  p { font-size: 13px; margin-bottom: 16px; opacity: 0.8; }
  .bar-track { width: 240px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; margin-bottom: 10px; }
  .bar-fill { height: 100%; width: 0%; background: #fff; border-radius: 2px; transition: width 0.5s ease-out; }
  .elapsed { font-size: 11px; opacity: 0.4; margin-bottom: 24px; }
  .hint { font-size: 12px; opacity: 0.5; max-width: 320px; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
  <h1>FADE</h1>
  <p>The void stirs...</p>
  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
  <p class="elapsed" id="elapsed">0s</p>
  <p class="hint">Starting local server...</p>
  <script>
    const bar = document.getElementById('bar');
    const elapsed = document.getElementById('elapsed');
    let ms = 0;
    setInterval(() => {
      ms += 500;
      elapsed.textContent = Math.floor(ms / 1000) + 's';
      bar.style.width = Math.min((ms / 10000) * 90, 90) + '%';
    }, 500);
  </script>
</body>
</html>
