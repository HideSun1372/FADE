<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Faint Aura - Development Experiment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }
    h1 {
      font-size: 52px;
      letter-spacing: 12px;
      margin-bottom: 32px;
    }
    p {
      font-size: 13px;
      opacity: 0.5;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.7; }
    }
    #error-msg {
      display: none;
      font-size: 13px;
      opacity: 0.6;
      animation: none;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>FADE</h1>
  <p>The Render backend is currently cold-starting, please hold on... (Up to 3 minutes)</p>
  <p id="error-msg">The app seems to be having trouble connecting. Are you connected to the internet?</p>
</body>
</html>
